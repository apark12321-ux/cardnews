<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>요즘돈 카드뉴스 자동화 툴</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">Instagram Carousel Automation</p>
      <h1>요즘돈 카드뉴스 자동화 툴</h1>
      <p class="lead">주제와 확인된 사실을 입력하면 13장 캐러셀 원고, 캡션, 해시태그, 발행 전 체크리스트를 자동 생성합니다.</p>
    </div>
    <aside class="rule"><b>정직 원칙</b><br />금액·기한·조건은 공식 출처 확인 후 발행</aside>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="panel-title">
        <h2>1. 입력</h2>
        <button id="sampleBtn" class="ghost" type="button">샘플</button>
      </div>

      <label>채널명<input id="channel" value="요즘돈" /></label>
      <label>인스타 핸들<input id="handle" value="@요즘돈" /></label>
      <label>주제<input id="topic" placeholder="예: 내가 받을 수 있는 지원금 5분 만에 찾는 법" /></label>

      <div class="two">
        <label>카테고리
          <select id="category">
            <option>지원금/정책</option>
            <option>절약/고정비</option>
            <option>카드/포인트</option>
            <option>소비 트렌드</option>
            <option>전월세/청약</option>
            <option>이번 주 트렌드 3</option>
          </select>
        </label>
        <label>타깃<input id="audience" value="2030~40 직장인·자영업자" /></label>
      </div>

      <label>지역/대상 조건<input id="region" placeholder="예: 전국 / 인천 / 청년 / 소상공인" /></label>
      <label>확인된 사실·조건<textarea id="facts" rows="6" placeholder="공식 출처에서 확인한 조건을 줄바꿈으로 입력"></textarea></label>
      <label>공식 출처 링크<textarea id="sources" rows="4" placeholder="공식 URL을 줄바꿈으로 입력"></textarea></label>
      <label>운영자 관점 한 줄<textarea id="note" rows="3" placeholder="내가 보고 느낀 해석 한 줄"></textarea></label>
      <label>CTA
        <select id="cta"><option>저장</option><option>공유</option><option>댓글</option><option>팔로우</option><option>DM</option></select>
      </label>

      <div class="buttons">
        <button id="generateBtn" type="button">카드뉴스 생성</button>
        <button id="resetBtn" class="ghost" type="button">초기화</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>2. 결과</h2>
        <div class="buttons small">
          <button id="copyBtn" class="ghost" type="button">복사</button>
          <button id="mdBtn" class="ghost" type="button">MD 저장</button>
          <button id="jsonBtn" class="ghost" type="button">JSON 저장</button>
        </div>
      </div>
      <div id="status" class="status">입력값을 채운 뒤 생성 버튼을 누르세요.</div>
      <div id="preview" class="cards"></div>
      <details open><summary>Markdown 원고</summary><textarea id="markdown" class="output" rows="18" readonly></textarea></details>
      <details><summary>발행 전 체크리스트</summary><div id="checklist" class="checklist"></div></details>
    </section>
  </main>

  <footer>요즘돈 카드뉴스 자동화 툴 · 입력값은 브라우저 안에서만 처리됩니다.</footer>
  <script src="./app.js"></script>
</body>
</html>
