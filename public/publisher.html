<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>요즘돈 자동 생성·자동 등록</title>
  <link rel="stylesheet" href="./publisher.css" />
</head>
<body>
  <header class="hero">
    <p class="eyebrow">Yojeumdon Auto Publisher</p>
    <h1>자동 생성에서 자동 등록까지</h1>
    <p>주제와 공식 출처를 입력하면 13장 카드뉴스를 만들고, PNG 렌더링 후 Instagram Graph API로 캐러셀 등록까지 진행합니다.</p>
  </header>

  <main class="shell">
    <section class="panel input-panel">
      <div class="bar">
        <h2>1. 콘텐츠 입력</h2>
        <button id="sampleBtn" type="button" class="ghost">샘플</button>
      </div>
      <label>채널명<input id="channel" value="요즘돈" /></label>
      <label>인스타 핸들<input id="handle" value="@요즘돈" /></label>
      <label>주제<input id="topic" placeholder="예: 내가 받을 수 있는 지원금 5분 만에 찾는 법" /></label>
      <label>대상/지역<input id="target" placeholder="예: 전국 / 청년 / 근로자 / 인천 자영업자" /></label>
      <label>확인된 사실<textarea id="facts" rows="5" placeholder="공식 출처에서 확인한 조건을 줄바꿈으로 입력"></textarea></label>
      <label>공식 출처 URL<textarea id="sources" rows="3" placeholder="https://..."></textarea></label>
      <label>운영자 관점 한 줄<textarea id="note" rows="2" placeholder="AI 티가 나지 않게 내 관점을 한 줄로 입력"></textarea></label>
      <label>CTA
        <select id="cta">
          <option>저장</option>
          <option>공유</option>
          <option>댓글</option>
          <option>팔로우</option>
        </select>
      </label>
      <div class="actions">
        <button id="generateBtn" type="button">카드 생성</button>
        <button id="renderBtn" type="button" class="ghost">PNG 렌더링</button>
      </div>
    </section>

    <section class="panel output-panel">
      <div class="bar">
        <h2>2. 미리보기·등록</h2>
        <span id="serverStatus" class="pill">서버 확인 전</span>
      </div>
      <div id="status" class="status">입력 후 카드 생성 버튼을 누르세요.</div>
      <div id="cards" class="cards"></div>
      <div class="actions">
        <button id="dryRunBtn" type="button" class="ghost">드라이런 검증</button>
        <button id="publishBtn" type="button" class="danger">인스타 자동 등록</button>
      </div>
      <details open>
        <summary>캡션</summary>
        <textarea id="caption" rows="10"></textarea>
      </details>
      <details>
        <summary>API 응답</summary>
        <pre id="log">아직 요청 없음</pre>
      </details>
    </section>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <div class="card-no"></div>
      <h3></h3>
      <p></p>
      <b></b>
    </article>
  </template>

  <script src="./publisher.js"></script>
</body>
</html>
